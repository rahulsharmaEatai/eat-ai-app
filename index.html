<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eat.AI - Hindi Voice Generator</title>

<style>
body {
  background: #0d0d0d;
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
  padding: 40px;
}
.container {
  width: 600px;
}
textarea {
  width: 100%;
  height: 120px;
  padding: 10px;
  background: #1a1a1a;
  color: white;
  border: none;
  border-radius: 8px;
}
select, input {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  background: #1a1a1a;
  color: white;
  border: none;
  border-radius: 8px;
}
button {
  margin-top: 15px;
  padding: 12px;
  width: 100%;
  background: orange;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
audio {
  margin-top: 15px;
  width: 100%;
}
</style>
</head>

<body>

<div class="container">
<h2>🎙️ Eat.AI Hindi Voice Generator</h2>

<textarea id="text" placeholder="Hindi text likho..."></textarea>

<select id="voice"></select>

<label>Speed</label>
<input type="range" min="0.5" max="2" step="0.1" value="1" id="speed">

<button onclick="speak()">Generate Voice</button>

<audio id="audio" controls></audio>

<button onclick="download()">Download</button>
</div>

<script>
let voices = [];

function loadVoices() {
  voices = speechSynthesis.getVoices();
  let select = document.getElementById("voice");
  select.innerHTML = "";

  voices.forEach((v, i) => {
    if (v.lang.includes("hi")) {
      let option = document.createElement("option");
      option.value = i;
      option.text = v.name;
      select.appendChild(option);
    }
  });
}

speechSynthesis.onvoiceschanged = loadVoices;

function speak() {
  let text = document.getElementById("text").value;
  let speed = document.getElementById("speed").value;
  let voiceIndex = document.getElementById("voice").value;

  let utter = new SpeechSynthesisUtterance(text);
  utter.voice = voices[voiceIndex];
  utter.rate = speed;

  speechSynthesis.speak(utter);
}

function download() {
  alert("Browser limitation: direct MP3 download not supported.\nUse screen recorder or advanced API later.");
}
</script>

</body>
</html>
